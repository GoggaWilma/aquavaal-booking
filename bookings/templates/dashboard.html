<h1>Aqua Vaal Hengelklub Dashboard</h1>

<p>Total Bookings: {{ total }}</p>

<hr>

<h2>Recent Bookings</h2>

<ul>
{% for booking in bookings %}
    <li>Booking ID: {{ booking.id }}</li>
{% empty %}
    <li>No bookings yet</li>
{% endfor %}
</ul>

<hr>

<a href="/admin/">Admin</a>

<a href="/report/stands/" style="
    display:inline-block;
    padding:12px 20px;
    background:#2f6f8f;
    color:white;
    border-radius:6px;
    text-decoration:none;
">
📄 Download Stand Report
</a>

<h2>Stand Layout PDF</h2>

<form action="/report/stands/" method="get" style="margin-top:20px;">
    <label for="arrival">Arrival:</label>
    <input type="date" name="arrival" id="arrival" required>

    <label for="departure" style="margin-left:10px;">Departure:</label>
    <input type="date" name="departure" id="departure" required>

    <button type="submit" style="
        padding:10px 16px;
        background:#2f6f8f;
        color:white;
        border:none;
        border-radius:6px;
        margin-left:10px;
    ">
        Generate Stand Layout PDF
    </button>
</form>
