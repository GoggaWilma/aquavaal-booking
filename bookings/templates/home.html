{% load static %}

<!DOCTYPE html>
<html>
<head>
<title></title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}

/* animated background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("{% static 'images/background.jpg' %}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    animation: slowZoom 40s infinite alternate;

    z-index:-1;
}

@keyframes slowZoom{
    0%{
        transform:scale(1);
    }
    100%{
        transform:scale(1.1);
    }
}

.container{
    padding-top:120px;
    position:relative;
    z-index:2;
}

/* logo */
.logo{
    width:600px;
    margin-bottom:20px;
}

/* headings */

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:30px;
    margin-bottom:40px;
}

/* buttons */

.buttons{
    width:400px;
    margin:auto;
}

.button{
    display:block;
    margin:15px 0;
    padding:15px;
    background:#09137A;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-size:18px;
}

.button:hover{
    background:#09137A;
}

/* footer */

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:14px;
    opacity:0.7;
}

</style>

<div class="container">

<img src="{% static 'images/logo.png' %}" class="logo">

<h1></h1>
<p></p>

<div class="buttons">

<a class="button" href="/bookings/dashboard/">
DASHBOARD LOGIN<br>  
Members and Non-Members
</a>

<a class="button" href="/admin/">
Admin Login
</a>

</div>

</div>
